<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WordGuess</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1, h2 { color: #333; }
        input, button { margin: 5px; padding: 8px; }
        button { cursor: pointer; background-color: #4CAF50; color: white; border: none; border-radius: 4px; }
        button:hover { background-color: #45a049; }
        .error { color: red; }
        .success { color: green; }
        .game-panel { border: 1px solid #ddd; padding: 10px; margin: 10px 0; background: #fafafa; }
        .result-letter { display: inline-block; width: 40px; height: 40px; line-height: 40px; text-align: center; margin: 2px; font-weight: bold; border-radius: 4px; }
        .correct { background-color: #6aaa64; color: white; }
        .present { background-color: #c9b458; color: white; }
        .absent { background-color: #787c7e; color: white; }
        .game-completed { font-weight: bold; margin: 10px 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
<div class="container">
    <h1>WordGuess 🎮</h1>

    <!-- Sección de autenticación -->
    <div id="auth-section">
        <h2>Registro / Login</h2>
        <input type="text" id="reg-username" placeholder="Usuario">
        <input type="password" id="reg-password" placeholder="Contraseña">
        <button onclick="register()">Registrar</button>
        <br>
        <input type="text" id="login-username" placeholder="Usuario">
        <input type="password" id="login-password" placeholder="Contraseña">
        <button onclick="login()">Iniciar sesión</button>
        <div id="auth-message"></div>
    </div>

    <!-- Sección principal (visible solo después de login) -->
    <div id="main-section" style="display:none;">
        <h2>Bienvenido, <span id="username-display"></span> (admin: <span id="admin-badge"></span>)</h2>
        <button onclick="logout()">Cerrar sesión</button>
        <hr>

        <div>
            <h3>Jugar</h3>
            <button onclick="startGame()">Iniciar nueva partida</button>
            <div id="game-info" class="game-panel" style="display:none;">
                <p><strong>Partida ID:</strong> <span id="game-id"></span></p>
                <p><strong>Intentos restantes:</strong> <span id="attempts-left"></span></p>
                <div>
                    <input type="text" id="guess-input" placeholder="Escribe tu palabra" style="width:200px;">
                    <button onclick="makeAttempt()">Intentar</button>
                </div>
                <div id="result-container"></div>
                <div id="game-status"></div>
            </div>
        </div>

        <hr>
        <button onclick="showHistory()">Ver mi historial</button>
        <div id="history-container"></div>

        <hr>
        <h3>Tabla de posiciones</h3>
        <div id="leaderboard-container"></div>
    </div>
</div>

<script>
    const API_BASE = 'https://wordguessapi-1.onrender.com/api';

    // Helper para peticiones autenticadas
    async function authFetch(url, options = {}) {
        const token = localStorage.getItem('token');
        options.headers = {
            ...options.headers,
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
        };
        const response = await fetch(url, options);
        if (response.status === 401) {
            alert('Sesión expirada. Por favor, inicia sesión nuevamente.');
            logout();
        }
        return response;
    }

    // Registrar usuario
    async function register() {
        const username = document.getElementById('reg-username').value;
        const password = document.getElementById('reg-password').value;
        const messageDiv = document.getElementById('auth-message');

        try {
            const res = await fetch(`${API_BASE}/Auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (data.success) {
                messageDiv.innerHTML = `<span class="success">✅ Registro exitoso. Ahora inicia sesión.</span>`;
            } else {
                messageDiv.innerHTML = `<span class="error">❌ ${data.message}</span>`;
            }
        } catch (err) {
            messageDiv.innerHTML = `<span class="error">Error de conexión</span>`;
        }
    }

    // Login
    async function login() {
        const username = document.getElementById('login-username').value;
        const password = document.getElementById('login-password').value;
        const messageDiv = document.getElementById('auth-message');

        try {
            const res = await fetch(`${API_BASE}/Auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (data.success) {
                localStorage.setItem('token', data.data.token);
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('main-section').style.display = 'block';
                document.getElementById('username-display').innerText = username;
                // Determinar si es admin (podríamos obtenerlo del token)
                // Por ahora lo dejamos simple
                document.getElementById('admin-badge').innerText = '';
                // Cargar leaderboard y mostrar info
                loadLeaderboard();
            } else {
                messageDiv.innerHTML = `<span class="error">❌ ${data.message}</span>`;
            }
        } catch (err) {
            messageDiv.innerHTML = `<span class="error">Error de conexión</span>`;
        }
    }

    // Logout
    function logout() {
        localStorage.removeItem('token');
        document.getElementById('auth-section').style.display = 'block';
        document.getElementById('main-section').style.display = 'none';
        document.getElementById('game-info').style.display = 'none';
        document.getElementById('history-container').innerHTML = '';
        document.getElementById('leaderboard-container').innerHTML = '';
        document.getElementById('auth-message').innerHTML = '';
    }

    // Iniciar partida
    async function startGame() {
        try {
            const res = await authFetch(`${API_BASE}/Games`, { method: 'POST', body: '{}' });
            const data = await res.json();
            if (data.success) {
                const gameId = data.data.gameId;
                document.getElementById('game-id').innerText = gameId;
                document.getElementById('attempts-left').innerText = '6';
                document.getElementById('result-container').innerHTML = '';
                document.getElementById('game-status').innerHTML = '';
                document.getElementById('guess-input').value = '';
                document.getElementById('game-info').style.display = 'block';
                // Guardar gameId actual en un atributo
                document.getElementById('game-info').setAttribute('data-game-id', gameId);
            } else {
                alert('Error al iniciar partida: ' + data.message);
            }
        } catch (err) {
            alert('Error de conexión');
        }
    }

    // Realizar intento
    async function makeAttempt() {
        const gameId = document.getElementById('game-info').getAttribute('data-game-id');
        if (!gameId) return;
        const guess = document.getElementById('guess-input').value.trim();
        if (!guess) return;

        try {
            const res = await authFetch(`${API_BASE}/Games/${gameId}/attempts`, {
                method: 'POST',
                body: JSON.stringify({ guess })
            });
            const data = await res.json();
            if (!data.success) {
                alert(data.message);
                return;
            }

            // Mostrar resultado
            const result = JSON.parse(data.data.result);
            const resultContainer = document.getElementById('result-container');
            // Mostrar cada letra con su color
            let lettersHtml = '';
            result.forEach(item => {
                let statusClass = '';
                if (item.status === 'correct') statusClass = 'correct';
                else if (item.status === 'present') statusClass = 'present';
                else statusClass = 'absent';
                lettersHtml += `<div class="result-letter ${statusClass}">${item.letter}</div>`;
            });
            resultContainer.innerHTML = lettersHtml;

            // Actualizar intentos restantes
            document.getElementById('attempts-left').innerText = data.data.attemptsLeft;

            if (data.data.gameCompleted) {
                document.getElementById('game-status').innerHTML = data.data.won ? '🎉 ¡Ganaste! 🎉' : '😢 Perdiste. La palabra era... (puedes verla en historial)';
                document.getElementById('guess-input').disabled = true;
                document.querySelector('#game-info button').disabled = true;
                // Recargar leaderboard e historial
                loadLeaderboard();
                if (document.getElementById('history-container').innerHTML !== '') showHistory();
            } else {
                document.getElementById('guess-input').value = '';
            }
        } catch (err) {
            alert('Error al enviar intento');
        }
    }

    // Mostrar historial de partidas del usuario
    async function showHistory() {
        try {
            const res = await authFetch(`${API_BASE}/me/games`);
            const data = await res.json();
            if (data.success && data.data.length > 0) {
                let html = '<h3>Mi historial</h3><table><tr><th>ID</th><th>Fecha</th><th>Completada</th><th>Ganada</th><th>Intentos</th><th>Palabra</th></tr>';
                data.data.forEach(game => {
                    const date = new Date(game.createdAt).toLocaleString();
                    html += `<tr>
                        <td>${game.id}</td>
                        <td>${date}</td>
                        <td>${game.isCompleted ? 'Sí' : 'No'}</td>
                        <td>${game.isWon ? 'Sí' : 'No'}</td>
                        <td>${game.attempts}</td>
                        <td>${game.word || '???'}</td>
                    </tr>`;
                });
                html += '</table>';
                document.getElementById('history-container').innerHTML = html;
            } else {
                document.getElementById('history-container').innerHTML = '<p>No hay partidas aún.</p>';
            }
        } catch (err) {
            document.getElementById('history-container').innerHTML = '<p>Error cargando historial.</p>';
        }
    }

    // Cargar leaderboard
    async function loadLeaderboard() {
        try {
            const res = await fetch(`${API_BASE}/Leaderboard`);
            const data = await res.json();
            if (data.success && data.data.length > 0) {
                let html = '<table><tr><th>Usuario</th><th>Victorias</th><th>Promedio intentos</th></tr>';
                data.data.forEach(entry => {
                    html += `<tr>
                        <td>${entry.username}</td>
                        <td>${entry.wins}</td>
                        <td>${entry.avgAttempts.toFixed(2)}</td>
                    </tr>`;
                });
                html += '</table>';
                document.getElementById('leaderboard-container').innerHTML = html;
            } else {
                document.getElementById('leaderboard-container').innerHTML = '<p>Sin datos aún.</p>';
            }
        } catch (err) {
            document.getElementById('leaderboard-container').innerHTML = '<p>Error cargando leaderboard.</p>';
        }
    }

    // Si ya había token al cargar, mostrar directamente la sección principal
    if (localStorage.getItem('token')) {
        document.getElementById('auth-section').style.display = 'none';
        document.getElementById('main-section').style.display = 'block';
        // Intentar obtener nombre del usuario desde el token (no lo tenemos, lo dejamos vacío)
        // Cargar leaderboard
        loadLeaderboard();
    } else {
        document.getElementById('auth-section').style.display = 'block';
        document.getElementById('main-section').style.display = 'none';
    }
</script>
</body>
</html>
