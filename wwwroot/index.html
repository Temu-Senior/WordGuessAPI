<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wordle Battle Royale</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.5/signalr.min.js"></script>

<style>
body { background:#121213; color:#fff; font-family:Arial; text-align:center; }
.tile { width:50px;height:50px;display:inline-flex;align-items:center;justify-content:center;margin:2px;background:#3a3a3c;font-size:20px }
.correct{background:#538d4e}.present{background:#b59f3b}.absent{background:#3a3a3c}
.countdown{font-size:50px;margin:20px}
</style>
</head>

<body>

<h1>WORDLE BATTLE ROYALE</h1>

<input id="username" placeholder="Usuario"><br><br>

<input id="roomInput" placeholder="Código sala">
<button onclick="joinRoom()">Unirse</button>
<button onclick="createRoom()">Crear</button>

<div id="status"></div>
<div id="countdown" class="countdown"></div>
<div id="board"></div>

<script>

const API_BASE = window.location.origin;

let connection = null;
let currentRoom = null;
let currentUsername = "";

let currentWordLength = 5;
let currentAttempts = [];
let currentGuess = "";

// ================== CONEXIÓN ==================

async function connectSignalR() {

    if (connection) {
        try { await connection.stop(); } catch {}
    }

    connection = new signalR.HubConnectionBuilder()
        .withUrl(`${API_BASE}/gameHub`)
        .withAutomaticReconnect()
        .build();

    // ===== DEBUG =====
    connection.on("JoinDebug", (room, connId) => {
        console.log("JOIN:", room, connId);
    });

    connection.on("GroupProbe", (room) => {
        console.log("✅ EN GRUPO:", room);
    });

    connection.on("CountdownTick", (sec) => {
        console.log("TICK:", sec);
        document.getElementById("countdown").innerText = sec;
    });

    connection.on("PlayersUpdate", (players) => {
        console.log("PLAYERS:", players);
    });

    connection.on("WaitingForPlayers", (count) => {
        setStatus("Esperando jugadores: " + count);
    });

    connection.on("RoundStarted", (length) => {
        currentWordLength = length;
        currentAttempts = [];
        currentGuess = "";

        buildBoard();
        setStatus("¡Ronda iniciada!");
    });

    connection.on("GuessResult", (res) => {
        currentAttempts.push({ guess: res.guess, result: res.resultArray });
        drawBoard();
    });

    connection.on("Error", (e) => alert(e));

    connection.onclose(() => console.log("❌ desconectado"));
    connection.onreconnecting(() => console.log("🔄 reconectando..."));
    connection.onreconnected(() => console.log("✅ reconectado"));

    await connection.start();
    console.log("✅ conectado");
}

// ================== SEGURIDAD ==================

async function ensureConnection() {
    if (!connection) {
        await connectSignalR();
    }
    if (connection.state !== "Connected") {
        await connection.start();
    }
}

// ================== SALAS ==================

async function createRoom() {
    currentUsername = document.getElementById("username").value.trim();
    if (!currentUsername) return alert("Pon usuario");

    const room = Math.random().toString(36).substring(2,6).toUpperCase();

    await ensureConnection();

    await connection.invoke("CreateRoom", room, "normal", currentUsername);

    currentRoom = room;
    setStatus("Sala creada: " + room);
}

async function joinRoom() {
    currentUsername = document.getElementById("username").value.trim();
    const room = document.getElementById("roomInput").value.trim().toUpperCase();

    if (!currentUsername || !room) return alert("Datos faltantes");

    await ensureConnection();

    await connection.invoke("JoinRoom", room, currentUsername);

    currentRoom = room;
    setStatus("Unido a " + room);
}

// ================== JUEGO ==================

function buildBoard() {
    const board = document.getElementById("board");
    board.innerHTML = "";

    for (let i=0;i<6;i++){
        const row = document.createElement("div");
        for (let j=0;j<currentWordLength;j++){
            const tile = document.createElement("div");
            tile.className="tile";
            tile.id=`t-${i}-${j}`;
            row.appendChild(tile);
        }
        board.appendChild(row);
    }
}

function drawBoard(){
    for (let i=0;i<currentAttempts.length;i++){
        const a = currentAttempts[i];

        for (let j=0;j<a.guess.length;j++){
            const tile = document.getElementById(`t-${i}-${j}`);
            tile.innerText = a.guess[j];

            const st = a.result[j].status;
            tile.classList.add(st);
        }
    }
}

// ================== INPUT ==================

window.addEventListener("keydown", e => {

    if (!currentRoom) return;

    if (e.key === "Enter") {
        if (currentGuess.length === currentWordLength) {
            connection.invoke("MakeGuess", currentRoom, currentGuess, currentUsername);
            currentGuess="";
        }
    }
    else if (e.key === "Backspace") {
        currentGuess = currentGuess.slice(0,-1);
    }
    else if (/^[a-zA-Z]$/.test(e.key)) {
        if (currentGuess.length < currentWordLength) {
            currentGuess += e.key.toUpperCase();
        }
    }

});

// ================== UI ==================

function setStatus(msg){
    document.getElementById("status").innerText = msg;
}

</script>

</body>
</html>
